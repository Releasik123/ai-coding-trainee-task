services:
  - type: web
    name: ai-coding-trainee-task
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: APP_BASE_URL
        value: https://ai-coding-trainee-task.onrender.com
      - key: FRONTEND_URL
        value: https://ai-coding-trainee-task.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://ai-coding-trainee-task.onrender.com

